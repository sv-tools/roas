[workspace]
resolver = "3"
members = ["crates/*"]

[workspace.package]
version = "0.11.0"
edition = "2024"
authors = ["Sergey Vilgelm <sergey@vilgelm.com>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/sv-tools/roas"
repository = "https://github.com/sv-tools/roas"
keywords = ["openapi", "swagger"]

[workspace.dependencies]
roas = { version = "0.11.0", path = "crates/roas" }
roas-http-fetcher = { version = "0.11.0", path = "crates/roas-http-fetcher" }

enumset = "1.1.10"
lazy-regex = "3.6.0"
monostate = "1.0.0"
regex = "1.11.2"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.143"
thiserror = "2.0.16"
url = "2.5.8"

anyhow = "1.0.99"
clap = { version = "4.5.50", features = ["derive"] }
reqwest = { version = "0.12.24", default-features = false, features = ["blocking", "rustls-tls"] }
