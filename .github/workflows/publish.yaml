name: Publish

# External-distribution half of the release flow: cargo publish to
# crates.io, push the multi-arch container image to GHCR, and update
# the Homebrew tap. Fires when a GitHub Release transitions from
# draft → published (i.e. the user reviewed the draft minted by
# `release-stage.yaml` and clicked Publish).
#
# Also exposed via `workflow_dispatch` so a partial failure (crates.io
# rate-limit, ghcr.io 5xx, etc.) can be retried without re-tagging.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)publish (e.g. roas-cli/v0.3.1)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

permissions: read-all

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Parse the triggering tag into `<package>` + `<version>` so downstream
  # jobs don't have to re-derive them. Tags are `<crate>/v<x.y.z>`; both
  # event triggers (`release` and manual dispatch) feed into the same
  # parse step.
  # ────────────────────────────────────────────────────────────────────────
  Resolve:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.parse.outputs.tag }}
      package: ${{ steps.parse.outputs.package }}
      version: ${{ steps.parse.outputs.version }}
      is_roas_cli: ${{ steps.parse.outputs.is_roas_cli }}
    steps:
      - id: parse
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail
          if [[ "$TAG" != */v* ]]; then
            echo "::error::tag '$TAG' must be in the form <package>/v<version>"
            exit 1
          fi
          PACKAGE="${TAG%/v*}"
          VERSION="${TAG##*/v}"
          {
            echo "tag=$TAG"
            echo "package=$PACKAGE"
            echo "version=$VERSION"
            if [[ "$PACKAGE" = "roas-cli" ]]; then
              echo "is_roas_cli=true"
            else
              echo "is_roas_cli=false"
            fi
          } >> "$GITHUB_OUTPUT"

  Publish:
    needs: Resolve
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # `rust-lang/crates-io-auth-action` exchanges the workflow's OIDC
      # token for a short-lived crates.io publish token; that exchange
      # requires `id-token: write`. Granted on this job only.
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.Resolve.outputs.tag }}
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - run: cargo publish --all-features --package ${{ needs.Resolve.outputs.package }} --verbose
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # ────────────────────────────────────────────────────────────────────────
  # roas-cli distribution beyond crates.io: container image + Homebrew
  # formula. The prebuilt tarballs were attached to the release by
  # `release-stage.yaml#AttachRoasCliBinaries`; we download them from the
  # release (rather than rebuilding) so the bits in the registry, the
  # GitHub Release, and Homebrew bottles are byte-identical.
  # ────────────────────────────────────────────────────────────────────────
  PublishRoasCli:
    needs:
      - Resolve
      - Publish
    if: ${{ needs.Resolve.outputs.is_roas_cli == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout + `gh release download`
      packages: write  # push the container image to ghcr.io
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.Resolve.outputs.tag }}

      - name: Download release tarballs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.Resolve.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          gh release download "$TAG" \
            --dir artifacts \
            --pattern 'roas-*.tar.gz' \
            --pattern 'roas-*.tar.gz.sha256'

      # ── Container image ──────────────────────────────────────────────────
      # Stage the linux binaries into a tiny build context so the
      # multi-arch `docker build` just COPYs them in. No QEMU rebuild
      # of the rust dep tree.
      - name: Stage linux binaries for docker build
        env:
          V: ${{ needs.Resolve.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p ctx/linux/amd64 ctx/linux/arm64
          tar -xzf "artifacts/roas-${V}-x86_64-unknown-linux-gnu.tar.gz" -C ctx/linux/amd64
          tar -xzf "artifacts/roas-${V}-aarch64-unknown-linux-gnu.tar.gz" -C ctx/linux/arm64
          chmod +x ctx/linux/amd64/roas ctx/linux/arm64/roas
          cp Dockerfile ctx/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GITHUB_TOKEN already carries `packages: write` against
          # ghcr.io/${owner-of-repo}/* — no separate secret needed.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push roas-cli container image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ctx
          file: ctx/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/sv-tools/roas:${{ needs.Resolve.outputs.version }}
            ghcr.io/sv-tools/roas:latest
          # Point `source` at the roas-cli subdirectory rather than the
          # workspace root: GHCR uses this label to pick the README it
          # renders on the package page, and the CLI README is the right
          # surface for someone who landed here from
          # `ghcr.io/sv-tools/roas`. Documentation label points at the
          # same place explicitly for clients that prefer it.
          labels: |
            org.opencontainers.image.source=https://github.com/sv-tools/roas/tree/main/crates/roas-cli
            org.opencontainers.image.documentation=https://github.com/sv-tools/roas/blob/main/crates/roas-cli/README.md
            org.opencontainers.image.description=Command-line front-end for the roas OpenAPI library
            org.opencontainers.image.licenses=MIT OR Apache-2.0
            org.opencontainers.image.version=${{ needs.Resolve.outputs.version }}

      # ── Homebrew formula ─────────────────────────────────────────────────
      # Source the release-asset SHAs from the tarballs we downloaded.
      # The canonical asset URL is
      # `https://github.com/${repo}/releases/download/${tag}/${asset}`.
      - name: Collect Homebrew asset SHAs
        id: sha
        env:
          V: ${{ needs.Resolve.outputs.version }}
        run: |
          set -euo pipefail
          read_sha() {
            # `.tar.gz.sha256` is `<sha>  <archive>` — keep the first field.
            awk '{print $1}' "artifacts/roas-${V}-$1.tar.gz.sha256"
          }
          {
            echo "darwin_arm64=$(read_sha aarch64-apple-darwin)"
            echo "linux_arm64=$(read_sha aarch64-unknown-linux-gnu)"
            echo "linux_amd64=$(read_sha x86_64-unknown-linux-gnu)"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: sv-tools/homebrew-apps
          # Fine-grained PAT (Contents: read+write on
          # sv-tools/homebrew-apps) stored as a secret in this repo.
          # The default GITHUB_TOKEN is scoped to sv-tools/roas only.
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-apps

      - name: Render and commit Homebrew formula
        working-directory: homebrew-apps
        env:
          VERSION: ${{ needs.Resolve.outputs.version }}
          REPO_URL: https://github.com/${{ github.repository }}
          TAG: ${{ needs.Resolve.outputs.tag }}
          DARWIN_ARM64_SHA: ${{ steps.sha.outputs.darwin_arm64 }}
          LINUX_ARM64_SHA: ${{ steps.sha.outputs.linux_arm64 }}
          LINUX_AMD64_SHA: ${{ steps.sha.outputs.linux_amd64 }}
        run: |
          set -euo pipefail
          mkdir -p Formula
          asset_url() {
            echo "${REPO_URL}/releases/download/${TAG}/roas-${VERSION}-$1.tar.gz"
          }
          # macOS bottle is arm64-only. Intel macOS users hit Homebrew's
          # "No available formula for this platform" error and should
          # `cargo install roas-cli` or use the Docker image.
          cat > Formula/roas.rb <<EOF
          # typed: false
          # frozen_string_literal: true
          #
          # Auto-generated by sv-tools/roas .github/workflows/publish.yaml.
          # Do not edit by hand — changes are overwritten on the next release.
          class Roas < Formula
            desc "Command-line front-end for the roas OpenAPI library"
            homepage "https://github.com/sv-tools/roas"
            version "${VERSION}"
            license any_of: ["MIT", "Apache-2.0"]

            on_macos do
              on_arm do
                url "$(asset_url aarch64-apple-darwin)"
                sha256 "${DARWIN_ARM64_SHA}"
              end
            end

            on_linux do
              on_arm do
                url "$(asset_url aarch64-unknown-linux-gnu)"
                sha256 "${LINUX_ARM64_SHA}"
              end
              on_intel do
                url "$(asset_url x86_64-unknown-linux-gnu)"
                sha256 "${LINUX_AMD64_SHA}"
              end
            end

            def install
              bin.install "roas"
              # Generate shell completions + manpages from the binary we
              # just installed — no extra tarball download required.
              generate_completions_from_executable(bin/"roas", "completions")
              man_dir = buildpath/"man"
              system bin/"roas", "manpages", "--out", man_dir
              man1.install Dir[man_dir/"*.1"]
            end

            test do
              assert_match "roas ${VERSION}", shell_output("#{bin}/roas --version")
            end
          end
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/roas.rb
          if git diff --cached --quiet; then
            echo "roas formula unchanged at ${VERSION}; nothing to commit"
          else
            git commit -m "roas ${VERSION}"
            git push
          fi

      # ── roas-action repo ─────────────────────────────────────────────────
      # The GitHub Action wrapper in sv-tools/roas-action pins the image
      # tag in its `Dockerfile` (`FROM ghcr.io/sv-tools/roas:<version>`).
      # On every roas-cli release we bump that pin, commit to `main`, and
      # tag `v<version>` so users can pin via `sv-tools/roas-action@vX.Y.Z`.
      # Idempotent: re-running for the same version is a no-op when the
      # pin and tag are already in place.
      - name: Checkout roas-action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: sv-tools/roas-action
          # Fine-grained PAT (Contents: read+write on
          # sv-tools/roas-action) stored as a secret in this repo. The
          # default GITHUB_TOKEN is scoped to sv-tools/roas only.
          token: ${{ secrets.ROAS_ACTION_TOKEN }}
          path: roas-action

      - name: Bump roas-action image pin and tag release
        working-directory: roas-action
        env:
          V: ${{ needs.Resolve.outputs.version }}
        run: |
          set -euo pipefail
          # Match any current pin (`:<version>` or `:latest`) and rewrite
          # it to the new version. Anchored to the `FROM` line so unrelated
          # mentions of the image elsewhere in the file aren't touched.
          sed -i -E "s|^FROM ghcr\.io/sv-tools/roas:.*|FROM ghcr.io/sv-tools/roas:${V}|" Dockerfile
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet Dockerfile; then
            echo "Dockerfile already pinned to ${V}; skipping commit"
          else
            git add Dockerfile
            git commit -m "roas ${V}"
            git push
          fi
          # Tag separately so a re-run after the commit landed but the tag
          # push failed (rare but possible) still creates the tag.
          if git ls-remote --tags origin "refs/tags/v${V}" | grep -q .; then
            echo "Tag v${V} already exists on remote; skipping"
          else
            git tag "v${V}"
            git push origin "v${V}"
          fi
