name: Release stage

# Tag-push half of the release flow: run full Checks, build the
# `roas-cli` per-target binaries, and mint a *draft* GitHub Release
# with everything attached. Nothing ships externally here — the
# crates.io / GHCR / Homebrew steps live in `publish.yaml` and fire
# when the user reviews the draft and clicks Publish.
#
# Why split: the tag push is automatic (a `git push origin <crate>/v<x>`),
# but external distribution should be a deliberate manual step so a
# botched tag doesn't propagate. Failed Checks here just block the
# draft from being filled in; no clean-up is needed on the registry.

on:
  push:
    # GitHub tag filters are globs, not regexes — `+` is literal here, so the
    # quantifier-style pattern would never match. Use globs.
    tags: [ "**/v[0-9]*.[0-9]*.[0-9]*" ]

env:
  CARGO_TERM_COLOR: always

permissions: read-all

jobs:
  Checks:
    # `OsvScanner` (and its PR sibling) inside the reusable workflow
    # request `security-events: write` to upload SARIF. Reusable
    # workflows can't escalate beyond what the caller grants, so pin
    # the broader scope here at the call site.
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: ./.github/workflows/checks.yaml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  DraftRelease:
    needs: Checks
    runs-on: ubuntu-latest
    permissions:
      # `softprops/action-gh-release` calls the Releases API and needs
      # `contents: write`. Nothing else in this job uses `GITHUB_TOKEN`,
      # so the workflow-level `read-all` default applies for everything
      # else.
      contents: write
    steps:
      # Mint (or update) a draft GitHub Release for the tag that
      # triggered this run. For `roas-cli`, `AttachRoasCliBinaries`
      # below appends the prebuilt tarballs to this same draft.
      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          draft: true
          # The repo carries multiple crates with their own tags; don't
          # let any one release hijack the repo-wide "Latest" badge.
          make_latest: false

  # ────────────────────────────────────────────────────────────────────────
  # roas-cli pre-build matrix. Fires only when the tag is `roas-cli/v…`.
  # Per-target native runners keep `cargo build` off QEMU, which would
  # otherwise rebuild the whole rust dep tree per architecture.
  # ────────────────────────────────────────────────────────────────────────
  RoasCliBuild:
    needs: Checks
    if: ${{ contains(fromJSON(needs.Checks.outputs.publish), 'roas-cli') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          # macOS is arm64-only. macos-13 (Intel) is being phased out by
          # GitHub and queues for hours; cross-building x86_64 via
          # cargo-zigbuild failed at link time because notify / reqwest
          # pull in CoreServices / CoreFoundation / Security and zig
          # doesn't bundle those frameworks. Intel macOS users can
          # `cargo install roas-cli` or use the Docker image.
          - target: aarch64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          target: ${{ matrix.target }}
      - name: Extract roas-cli version from tag
        id: v
        run: echo "version=${GITHUB_REF#refs/tags/roas-cli/v}" >> "$GITHUB_OUTPUT"
        shell: bash
      - name: Build release binary
        run: cargo build --release --package roas-cli --target ${{ matrix.target }} --locked
      - name: Pack tarball
        id: pack
        run: |
          set -euo pipefail
          archive="roas-${{ steps.v.outputs.version }}-${{ matrix.target }}.tar.gz"
          # `tar -C` so the archive contains just `roas`, not a path
          # prefix — Homebrew's `bin.install "roas"` expects the binary
          # at archive root.
          tar -C "target/${{ matrix.target }}/release" -czf "$archive" roas
          # `shasum -a 256` is portable across the macOS / linux
          # runners; `sha256sum` isn't installed by default on macOS.
          shasum -a 256 "$archive" > "${archive}.sha256"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
        shell: bash
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: roas-cli-${{ matrix.target }}
          path: |
            ${{ steps.pack.outputs.archive }}
            ${{ steps.pack.outputs.archive }}.sha256

  # ────────────────────────────────────────────────────────────────────────
  # Smoke-test the release image with the actual tarball binaries before
  # they reach a human reviewer. Mirrors the staging logic in
  # `publish.yaml` so a GLIBC / base-image mismatch surfaces here rather
  # than as a runtime crash for downstream `docker run` users. Native
  # runners per arch so `docker run` exercises the binary directly, no
  # QEMU emulation involved.
  # ────────────────────────────────────────────────────────────────────────
  DockerImageSmokeTest:
    needs:
      - Checks
      - RoasCliBuild
    if: ${{ contains(fromJSON(needs.Checks.outputs.publish), 'roas-cli') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - arch: arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Extract roas-cli version from tag
        id: v
        run: echo "version=${GITHUB_REF#refs/tags/roas-cli/v}" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: roas-cli-${{ matrix.target }}
          path: artifacts
      - name: Stage linux binary for docker build
        env:
          V: ${{ steps.v.outputs.version }}
          ARCH: ${{ matrix.arch }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          mkdir -p "ctx/linux/${ARCH}"
          tar -xzf "artifacts/roas-${V}-${TARGET}.tar.gz" -C "ctx/linux/${ARCH}"
          chmod +x "ctx/linux/${ARCH}/roas"
          cp Dockerfile ctx/
      - name: Build image
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          docker build \
            --build-arg TARGETOS=linux \
            --build-arg "TARGETARCH=${ARCH}" \
            -t roas:smoke ctx
      - name: Smoke-test image (binary actually starts under distroless)
        run: docker run --rm roas:smoke --version

  # ────────────────────────────────────────────────────────────────────────
  # Shell completions + manpages. Both are derived from clap's command
  # tree, so the artifacts are platform-independent — one ubuntu-latest
  # build is enough. The `completions` and `manpages` subcommands on the
  # built binary do the actual rendering; the workflow packs the outputs
  # into two tarballs (`roas-${V}-completions.tar.gz`,
  # `roas-${V}-manpages.tar.gz`) and uploads them alongside the per-target
  # binary archives so `AttachRoasCliBinaries` can attach everything in
  # one shot.
  # ────────────────────────────────────────────────────────────────────────
  RoasCliExtras:
    needs: Checks
    if: ${{ contains(fromJSON(needs.Checks.outputs.publish), 'roas-cli') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - name: Extract roas-cli version from tag
        id: v
        run: echo "version=${GITHUB_REF#refs/tags/roas-cli/v}" >> "$GITHUB_OUTPUT"
      - name: Build roas-cli
        run: cargo build --release --package roas-cli --locked
      - name: Generate completions and manpages
        env:
          ROAS: target/release/roas
        run: |
          set -euo pipefail
          mkdir -p completions manpages
          # File-name conventions per shell: bash uses the bare bin name,
          # zsh expects `_<name>`, fish wants `<name>.fish`, powershell
          # uses `_<name>.ps1`, elvish wants `<name>.elv`. Match what
          # each shell autodiscovers so users can drop the file straight
          # into their completion directory.
          "$ROAS" completions bash       > completions/roas.bash
          "$ROAS" completions zsh        > completions/_roas
          "$ROAS" completions fish       > completions/roas.fish
          "$ROAS" completions powershell > completions/_roas.ps1
          "$ROAS" completions elvish     > completions/roas.elv
          "$ROAS" manpages --out manpages
      - name: Pack tarballs
        env:
          V: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          completions_archive="roas-${V}-completions.tar.gz"
          manpages_archive="roas-${V}-manpages.tar.gz"
          # `tar -C <dir> .` puts the files at the archive root rather
          # than under a `completions/` or `manpages/` prefix — matches
          # what consumers (Homebrew, ad-hoc tar -xzf) expect.
          tar -czf "$completions_archive" -C completions .
          tar -czf "$manpages_archive" -C manpages .
          shasum -a 256 "$completions_archive" > "${completions_archive}.sha256"
          shasum -a 256 "$manpages_archive" > "${manpages_archive}.sha256"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # `roas-cli-*` prefix matches the wildcard pattern
          # `AttachRoasCliBinaries` already uses to download artifacts.
          name: roas-cli-extras
          path: |
            roas-${{ steps.v.outputs.version }}-completions.tar.gz
            roas-${{ steps.v.outputs.version }}-completions.tar.gz.sha256
            roas-${{ steps.v.outputs.version }}-manpages.tar.gz
            roas-${{ steps.v.outputs.version }}-manpages.tar.gz.sha256

  AttachRoasCliBinaries:
    needs:
      - Checks
      - DraftRelease
      - RoasCliBuild
      - RoasCliExtras
      - DockerImageSmokeTest
    if: ${{ contains(fromJSON(needs.Checks.outputs.publish), 'roas-cli') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write       # upload assets to the draft GitHub Release
      id-token: write       # OIDC token for keyless cosign signing + SLSA attestation
      attestations: write   # actions/attest-build-provenance writes to GitHub's attestation store
    steps:
      - name: Extract roas-cli version from tag
        id: v
        run: echo "version=${GITHUB_REF#refs/tags/roas-cli/v}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: roas-cli-*
          merge-multiple: true

      # ── Sigstore keyless signing ─────────────────────────────────────────
      # cosign in keyless mode exchanges the workflow's OIDC token for a
      # short-lived Fulcio certificate, signs each tarball, and records
      # both in Rekor (the public transparency log). Outputs are emitted
      # as siblings of each archive: `<archive>.sig` (base64 signature)
      # and `<archive>.crt` (PEM-encoded cert with the OIDC identity).
      # Verifiers run:
      #   cosign verify-blob \
      #     --certificate <archive>.crt \
      #     --signature   <archive>.sig \
      #     --certificate-identity-regexp 'https://github.com/sv-tools/roas/\.github/workflows/release-stage\.yaml@.*' \
      #     --certificate-oidc-issuer    'https://token.actions.githubusercontent.com' \
      #     <archive>
      - name: Install cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2
      - name: Sign release tarballs with cosign (keyless)
        env:
          COSIGN_YES: "true"
          V: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          archives=(artifacts/roas-${V}-*.tar.gz)
          if [[ ${#archives[@]} -eq 0 ]]; then
            echo "::error::no tarballs to sign — RoasCliBuild / RoasCliExtras inputs missing?"
            exit 1
          fi
          for archive in "${archives[@]}"; do
            cosign sign-blob --yes \
              --output-signature   "${archive}.sig" \
              --output-certificate "${archive}.crt" \
              "$archive"
          done

      # ── SLSA build provenance ────────────────────────────────────────────
      # Emits a SLSA v1.0 provenance attestation per subject path, signed
      # by Sigstore via OIDC and stored in GitHub's attestation API. The
      # attestation captures the workflow file + commit + runner, so a
      # consumer can later `gh attestation verify <archive> --repo
      # sv-tools/roas` to confirm provenance. We pass a hand-rolled
      # SLSA v1.0 predicate to `actions/attest` (the generic primitive)
      # rather than use the `attest-build-provenance` wrapper — same
      # attestation shape, one fewer transitive action to audit.
      - name: Attest SLSA build provenance for release tarballs
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            artifacts/roas-${{ steps.v.outputs.version }}-*.tar.gz
          predicate-type: https://slsa.dev/provenance/v1
          # buildType URI follows the GitHub-Actions workflow build type
          # registered by slsa-framework; `actions/runner/github-hosted`
          # is the canonical builder ID for the hosted-runner fleet.
          predicate: |
            {
              "buildDefinition": {
                "buildType": "https://actions.github.io/buildtypes/workflow/v1",
                "externalParameters": {
                  "workflow": {
                    "ref": "${{ github.ref }}",
                    "repository": "${{ github.server_url }}/${{ github.repository }}",
                    "path": ".github/workflows/release-stage.yaml"
                  }
                },
                "internalParameters": {
                  "github": {
                    "event_name": "${{ github.event_name }}",
                    "repository_id": "${{ github.repository_id }}",
                    "repository_owner_id": "${{ github.repository_owner_id }}"
                  }
                },
                "resolvedDependencies": [
                  {
                    "uri": "git+${{ github.server_url }}/${{ github.repository }}@${{ github.ref }}",
                    "digest": { "gitCommit": "${{ github.sha }}" }
                  }
                ]
              },
              "runDetails": {
                "builder": {
                  "id": "https://github.com/actions/runner/github-hosted"
                },
                "metadata": {
                  "invocationId": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}"
                }
              }
            }

      - name: Attach prebuilt binaries to draft Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          # Cosign sig + cert ride along with the tarballs so consumers
          # don't have to fetch them from a separate location. SLSA
          # provenance lives in GitHub's attestation store, not on the
          # release.
          files: |
            artifacts/roas-${{ steps.v.outputs.version }}-*.tar.gz
            artifacts/roas-${{ steps.v.outputs.version }}-*.tar.gz.sha256
            artifacts/roas-${{ steps.v.outputs.version }}-*.tar.gz.sig
            artifacts/roas-${{ steps.v.outputs.version }}-*.tar.gz.crt
          # Look up the existing draft minted by `DraftRelease` and
          # append rather than create a second release.
          draft: true
          make_latest: false
