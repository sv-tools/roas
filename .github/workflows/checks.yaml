name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true
    outputs:
      publish:
        value: ${{ jobs.RustMeta.outputs.publish }}
  schedule:
    - cron: "0 4 * * 1" # Mondays 04:00 UTC

env:
  CARGO_TERM_COLOR: always

permissions: read-all

jobs:
  RustMeta:
    name: Collect crate metadata
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.rustmeta.outputs.matrix }}
      publish: ${{ steps.rustmeta.outputs.publish }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: sv-tools/rust-metadata-action@4e7375355154e9cc49ebb10805dbcf2ce4860669 # v1.2.0
        id: rustmeta
        with:
          matrix-exclude-features: roas:default
  BuildJob:
    name: Build per Package and Feature
    needs: RustMeta
    strategy:
        matrix:
            args: ${{ fromJSON(needs.RustMeta.outputs.matrix) }}
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - run: cargo build ${{ matrix.args }} --all-targets --verbose
  Build:
    name: Wait for build jobs to finish
    needs: BuildJob
    runs-on: ubuntu-latest
    steps:
      - run: echo "Build jobs succeeded"
  Format:
    name: Check Rust code formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - run: cargo fmt --all --check --verbose
  Clippy:
    name: Check Rust code with Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - run: cargo install-tools
      - run: cargo clippy --all-features --all-targets --verbose -- --deny warnings
      - run: cargo clippy --all-features --all-targets --quiet --message-format=json | cargo-action-fmt
        if: failure()
  TestJob:
    name: Test per Package and Feature
    needs: RustMeta
    strategy:
      matrix:
        args: ${{ fromJSON(needs.RustMeta.outputs.matrix) }}
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - run: cargo install-tools
      - name: Run tests
        run: cargo llvm-cov nextest ${{ matrix.args }} --all-targets --no-fail-fast --no-tests=pass --verbose
      - name: Prepare coverage report
        if: ${{ !cancelled() }}
        run: cargo llvm-cov report --lcov --output-path coverage.lcov
      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          report_type: test_results
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  Tests:
    name: Wait for testing jobs to finish
    needs: TestJob
    runs-on: ubuntu-latest
    steps:
      - run: echo "Testing jobs succeeded"
  Deps:
    name: Check dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - run: cargo install-tools
      - name: Machete
        run: cargo machete
      - name: Deny
        run: cargo deny check all
  OsvScanner:
    name: OSV Scanner (PR diff)
    # Comparative scan that diffs the base branch's deps against the PR
    # head — only meaningful on `pull_request` events. Skip on push (a
    # merged PR already had this run on it), workflow_call (the publish
    # workflow gets crates.io + GHCR coverage from its own deny check),
    # and the weekly schedule.
    if: github.event_name == 'pull_request'
    permissions:
      actions: read
      contents: read
      security-events: write  # for SARIF upload to the Security tab
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
  PublishCrateJob:
    name: Test publishing per crate
    needs: RustMeta
    strategy:
      matrix:
        package: ${{ fromJSON(needs.RustMeta.outputs.publish) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - name: Dry run publish
        run: cargo publish --all-features --package ${{ matrix.package }} --dry-run --verbose
      - name: Create package
        run: cargo package --all-features --package ${{ matrix.package }} --verbose
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.package }}-crate
          path: target/package/${{ matrix.package }}-*.crate
  Publish:
    name: Wait for publishing jobs to finish
    needs:
      - RustMeta
      - PublishCrateJob
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        if: ${{ needs.RustMeta.outputs.publish != '[]' && (needs.PublishCrateJob.result == 'failure' || needs.PublishCrateJob.result == 'cancelled') }}
        run: exit 1
  AllChecks:
    name: All checks
    needs:
      - Build
      - Format
      - Clippy
      - Tests
      - Deps
      - OsvScanner
      - Publish
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      # `OsvScanner` is intentionally skipped on non-`pull_request` events,
      # so we deliberately don't treat 'skipped' as a failure here — every
      # other job in the needs list runs unconditionally and will surface
      # as 'failure' / 'cancelled' if anything went wrong.
      - name: Verify all checks succeeded
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
